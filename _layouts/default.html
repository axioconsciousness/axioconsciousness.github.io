<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <title>{% if page.title %}{{ page.title }} | UAFT{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --serif: 'Source Serif 4', Georgia, serif;
            --sans: 'Source Sans 3', 'Segoe UI', sans-serif;
            --bg: #FAFAF8;
            --surface: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #555555;
            --text-tertiary: #888888;
            --accent: #2C5F7C;
            --accent-light: #E8F0F5;
            --border: #E0E0DC;
            --max-width: 760px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        header {
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .header-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 2rem 1.5rem 1.8rem;
        }

        .site-title {
            font-family: var(--serif);
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
            margin-bottom: 0.2rem;
        }

        .site-title a {
            color: var(--text);
            text-decoration: none;
        }

        .site-title span {
            color: var(--accent);
        }

        .site-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* NAV */
        nav {
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            gap: 0;
            overflow-x: auto;
        }

        nav a {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.85rem 1rem;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: all 0.2s;
        }

        nav a:hover, nav a.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* BREADCRUMBS */
        .breadcrumbs {
            max-width: var(--max-width);
            margin: 1.5rem auto 0;
            padding: 0 1.5rem;
            font-family: var(--sans);
            font-size: 0.85rem;
            color: var(--text-tertiary);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.4rem;
        }

        .breadcrumbs a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .breadcrumbs a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .breadcrumb-sep {
            color: var(--text-tertiary);
            font-size: 0.85rem;
            user-select: none;
        }

        .breadcrumb-current {
            color: var(--text);
            font-weight: 500;
        }

        /* CATEGORY BADGES */
        .essay-category {
            font-family: var(--sans);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent);
            background: var(--accent-light);
            padding: 0.15rem 0.55rem;
            border-radius: 3px;
            letter-spacing: 0.02em;
        }

        /* ESSAY INDEX - CATEGORY SECTIONS */
        .category-section {
            margin-bottom: 2.5rem;
        }

        .category-section:last-child {
            margin-bottom: 0;
        }

        .category-heading {
            font-family: var(--serif);
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
            margin-bottom: 0.4rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent);
            display: inline-block;
        }

        .category-description {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            margin-bottom: 1rem;
            font-style: italic;
        }

        /* MAIN */
        main {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
        }

        /* ESSAY INDEX */
        .essay-list-item {
            padding: 1.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .essay-list-item:last-child {
            border-bottom: none;
        }

        .essay-list-item h2 {
            font-family: var(--serif);
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 0.4rem;
            line-height: 1.3;
        }

        .essay-list-item h2 a {
            color: var(--text);
            text-decoration: none;
        }

        .essay-list-item h2 a:hover {
            color: var(--accent);
        }

        .essay-meta {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            margin-bottom: 0.8rem;
        }

        .essay-excerpt {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ESSAY PAGE */
        .essay-header {
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .essay-title {
            font-family: var(--serif);
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 0.8rem;
            color: var(--text);
        }

        .essay-byline {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .essay-byline .date {
            color: var(--text-tertiary);
        }

        .essay-content {
            font-family: var(--serif);
            font-size: 1.05rem;
            line-height: 1.75;
            color: var(--text);
        }

        .essay-content p {
            margin-bottom: 1.2rem;
        }

        .essay-content h2 {
            font-family: var(--serif);
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-top: 2.2rem;
            margin-bottom: 1rem;
            color: var(--text);
            line-height: 1.3;
        }

        .essay-content h3 {
            font-family: var(--serif);
            font-size: 1.15rem;
            font-weight: 600;
            margin-top: 1.8rem;
            margin-bottom: 0.8rem;
            color: var(--text);
        }

        .essay-content a {
            color: var(--accent);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
        }

        .essay-content a:hover {
            text-decoration-thickness: 2px;
        }

        .essay-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1.2rem;
            margin: 1.5rem 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .essay-content blockquote p {
            margin-bottom: 0.8rem;
        }

        .essay-content em {
            font-style: italic;
        }

        .essay-content strong {
            font-weight: 600;
        }

        .essay-content ul, .essay-content ol {
            margin: 1rem 0 1.5rem 1.5rem;
        }

        .essay-content li {
            margin-bottom: 0.5rem;
        }

        .essay-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2.5rem 0;
        }

        .essay-content code {
            font-family: 'Consolas', 'Monaco', monospace;
            background: var(--accent-light);
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
            font-size: 0.9em;
        }

        /* FOOTER */
        .essay-footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-family: var(--sans);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .essay-footer p {
            margin-bottom: 0.5rem;
        }

        .essay-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .essay-footer a:hover {
            text-decoration: underline;
        }

        .back-to-essays {
            display: inline-block;
            margin-top: 1.5rem;
            font-family: var(--sans);
            font-size: 0.9rem;
            color: var(--accent);
            text-decoration: none;
        }

        .back-to-essays:hover {
            text-decoration: underline;
        }

        .page-title {
            font-family: var(--serif);
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .page-lead {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .nav-inner {
                padding: 0 0.75rem;
            }
            nav a {
                padding: 0.85rem 0.65rem;
                font-size: 0.8rem;
            }
            .essay-title {
                font-size: 1.5rem;
            }
            .essay-content {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="site-title"><a href="/"><span>UAFT</span> | Unified Axioconscious Field Theory</a></div>
        <div class="site-subtitle">Paul W. Barnes — Consciousness Researcher, Athabasca University</div>
    </div>
</header>

<nav>
    <div class="nav-inner">
        <a href="/index.html">Home</a>
        <a href="/research.html">Research</a>
        <a href="/essays.html">Essays</a>
        <a href="/reading.html">Reading</a>
        <a href="/theory.html">Theory</a>
        <a href="/glossary.html">Glossary</a>
    </div>
</nav>

<main>
    {{ content }}
</main>

</body>
</html>
